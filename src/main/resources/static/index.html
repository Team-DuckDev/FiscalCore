<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema FiscalCore</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .resultado {
            margin-top: 25px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 4px;
            display: none;
        }
        .resultado h3 {
            margin-top: 0;
            color: #495057;
        }
        .item-resultado {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .valor {
            font-weight: bold;
            color: #212529;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador FiscalCore</h2>
    
    <div class="form-group">
        <label for="valorTotal">Valor Inicial do Orçamento (R$):</label>
        <input type="number" id="valorTotal" value="2000" step="0.01">
    </div>

    <div class="form-group">
        <label for="quantidadeItens">Quantidade de Itens:</label>
        <input type="number" id="quantidadeItens" value="15">
    </div>

    <div class="form-group">
        <label for="tipoImposto">Selecione o Imposto (Strategy):</label>
        <select id="tipoImposto">
            <option value="IPI">IPI (Alíquota: +10%)</option>
            <option value="ICMS">ICMS (Gross-up: 18%)</option>
            <option value="ISS">ISS (Alíquota: +5%)</option>
            <option value="PIS">PIS (Alíquota: +1.65%)</option>
        </select>
    </div>

    <button onclick="calcular()">Calcular Valores</button>

    <div id="boxResultado" class="resultado">
        <h3>Resultado do Processamento:</h3>
        <div class="item-resultado">
            <span>Valor Original:</span>
            <span id="resOriginal" class="valor">R$ 0,00</span>
        </div>
        <div class="item-resultado">
            <span>Valor Após Descontos (Chain):</span>
            <span id="resDesconto" class="valor" style="color: #28a745;">R$ 0,00</span>
        </div>
        <div class="item-resultado">
            <span>Valor Final com Imposto:</span>
            <span id="resFinal" class="valor" style="color: #dc3545;">R$ 0,00</span>
        </div>
        <div class="item-resultado">
            <span>Imposto Aplicado:</span>
            <span id="resTipoImposto" class="valor">---</span>
        </div>
    </div>
</div>

<script>
    //javscript
    function calcular() {
        const valorTotal = parseFloat(document.getElementById('valorTotal').value);
        const quantidadeItens = parseInt(document.getElementById('quantidadeItens').value);
        const tipoImposto = document.getElementById('tipoImposto').value;

        const payload = {
            valorTotal: valorTotal,
            quantidadeItens: quantidadeItens
        };

        fetch(`http://localhost:8080/api/fiscal/calcular/${tipoImposto}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Erro ao processar requisição');
            }
            return response.json();
        })
        .then(dados => {
            document.getElementById('resOriginal').innerText = `R$ ${dados.valorOriginal.toFixed(2)}`;
            document.getElementById('resDesconto').innerText = `R$ ${dados.valorComDesconto.toFixed(2)}`;
            document.getElementById('resFinal').innerText = `R$ ${dados.valorFinalComImposto.toFixed(2)}`;
            document.getElementById('resTipoImposto').innerText = dados.tipoImposto;

            document.getElementById('boxResultado').style.display = 'block';
        })
        .catch(erro => {
            alert('Não foi possível conectar ao servidor Spring Boot. Certifique-se de que ele está rodando na porta 8080.');
            console.error(erro);
        });
    }
</script>

</body>
</html>
